<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>I2V 管理后台</title>
<style>
:root { --bg: #05070d; --bg2: #0c1220; --bg3: #101828; --bg4: #141f32; --border: rgba(255,255,255,0.07); --border2: rgba(255,255,255,0.12); --accent: #2f9cf5; --green: #22c55e; --red: #f04c64; --amber: #f5a623; --txt: #c8d8ec; --txt2: #6080a0; --txt3: #3a5070; }
* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: 'Segoe UI', system-ui, sans-serif; font-size: 13px; background: var(--bg); color: var(--txt); }
a { color: var(--accent); text-decoration: none; }

/* 顶栏 */
.topbar { display: flex; align-items: center; gap: 16px; padding: 12px 24px; background: var(--bg2); border-bottom: 1px solid var(--border); position: sticky; top: 0; z-index: 100; }
.topbar h1 { font-size: 16px; color: var(--accent); }
.topbar .config-row { display: flex; gap: 8px; margin-left: auto; align-items: center; }
.topbar input { background: var(--bg3); border: 1px solid var(--border2); border-radius: 6px; color: var(--txt); padding: 6px 10px; font-size: 12px; outline: none; }
.topbar input:focus { border-color: var(--accent); }
.topbar button { background: var(--accent); color: #fff; border: none; border-radius: 6px; padding: 6px 14px; font-size: 12px; cursor: pointer; }
.dot { width: 8px; height: 8px; border-radius: 50%; background: var(--txt3); }
.dot.ok { background: var(--green); }

/* 主体 */
.main { display: flex; height: calc(100vh - 50px); }

/* 左侧用户列表 */
.sidebar { width: 280px; min-width: 280px; background: var(--bg2); border-right: 1px solid var(--border); overflow-y: auto; }
.sidebar-header { padding: 12px 16px; font-size: 13px; font-weight: 600; color: var(--txt2); border-bottom: 1px solid var(--border); display: flex; justify-content: space-between; align-items: center; }
.sidebar-header button { font-size: 11px; padding: 4px 10px; }
.user-item { display: flex; align-items: center; gap: 10px; padding: 10px 16px; border-bottom: 1px solid var(--border); cursor: pointer; transition: background .15s; }
.user-item:hover { background: var(--bg3); }
.user-item.active { background: var(--bg4); border-left: 3px solid var(--accent); }
.user-item .uid { font-size: 11px; font-family: monospace; color: var(--txt2); }
.user-item .uinfo { font-size: 11px; color: var(--txt3); }
.user-item .ubadge { font-size: 10px; padding: 1px 6px; border-radius: 8px; margin-left: auto; }
.user-item .ubadge.active { background: rgba(34,197,94,0.15); color: var(--green); }

/* 右侧内容 */
.content { flex: 1; overflow-y: auto; padding: 20px; }
.card { background: var(--bg2); border: 1px solid var(--border); border-radius: 8px; padding: 16px; margin-bottom: 16px; }
.card h3 { font-size: 14px; font-weight: 600; margin-bottom: 10px; display: flex; align-items: center; justify-content: space-between; }

/* 统计 */
.stats { display: flex; gap: 12px; margin-bottom: 16px; }
.stat { flex: 1; background: var(--bg3); border: 1px solid var(--border); border-radius: 8px; padding: 14px; text-align: center; }
.stat .num { font-size: 24px; font-weight: 700; }
.stat .lbl { font-size: 11px; color: var(--txt3); margin-top: 2px; }

/* 表格 */
table { width: 100%; border-collapse: collapse; font-size: 12px; }
th { text-align: left; padding: 8px 10px; background: var(--bg3); color: var(--txt2); font-weight: 500; border-bottom: 1px solid var(--border); white-space: nowrap; }
td { padding: 8px 10px; border-bottom: 1px solid var(--border); vertical-align: top; }
tr:hover { background: rgba(255,255,255,0.02); }
td img { width: 50px; height: 50px; object-fit: cover; border-radius: 4px; cursor: pointer; }

/* 状态徽章 */
.badge { display: inline-block; padding: 2px 8px; border-radius: 8px; font-size: 10px; font-weight: 500; }
.badge-done { background: rgba(34,197,94,0.15); color: var(--green); }
.badge-pending { background: rgba(47,156,245,0.15); color: var(--accent); }
.badge-error { background: rgba(240,76,100,0.15); color: var(--red); }
.badge-submitted { background: rgba(245,166,35,0.15); color: var(--amber); }

/* 提示词单元格 */
.prompt-cell { max-width: 300px; position: relative; }
.prompt-short { overflow: hidden; text-overflow: ellipsis; white-space: nowrap; display: block; max-width: 300px; cursor: help; }
.prompt-full { display: none; position: absolute; left: 0; top: 100%; z-index: 50; background: var(--bg4); border: 1px solid var(--border2); border-radius: 8px; padding: 12px; width: 400px; max-height: 300px; overflow-y: auto; font-size: 11px; line-height: 1.6; white-space: pre-wrap; word-break: break-word; box-shadow: 0 8px 30px rgba(0,0,0,0.5); }
.prompt-cell:hover .prompt-full { display: block; }

/* 图片预览弹窗 */
.img-modal { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.8); z-index: 200; align-items: center; justify-content: center; cursor: pointer; }
.img-modal.show { display: flex; }
.img-modal img { max-width: 90%; max-height: 90%; border-radius: 8px; }

/* 许可码管理 */
.license-row { display: flex; gap: 8px; align-items: center; margin-bottom: 8px; }
.license-row input { flex: 1; }

/* 空状态 */
.empty { text-align: center; padding: 40px; color: var(--txt3); }

/* 加载 */
.loading { color: var(--txt3); padding: 20px; text-align: center; }
</style>
</head>
<body>

<!-- 顶栏 -->
<div class="topbar">
  <h1>I2V 管理后台</h1>
  <div class="config-row">
    <div class="dot" id="conn-dot"></div>
    <input id="cfg-key" type="password" placeholder="管理员密钥" style="width:160px" value="">
    <button onclick="connect()">连接</button>
  </div>
</div>

<!-- 主体 -->
<div class="main">

  <!-- 左侧用户列表 -->
  <div class="sidebar">
    <div class="sidebar-header">
      用户列表 <span id="user-total"></span>
      <button onclick="loadUsers()">刷新</button>
    </div>
    <div id="user-list"><div class="loading">请先输入管理员密钥并连接</div></div>
  </div>

  <!-- 右侧内容 -->
  <div class="content" id="content">

    <!-- 总览（默认显示） -->
    <div id="overview">
      <div class="stats">
        <div class="stat"><div class="num" id="s-users" style="color:var(--accent)">-</div><div class="lbl">总用户</div></div>
        <div class="stat"><div class="num" id="s-rows" style="color:var(--green)">-</div><div class="lbl">总任务行</div></div>
        <div class="stat"><div class="num" id="s-done" style="color:var(--green)">-</div><div class="lbl">已完成</div></div>
        <div class="stat"><div class="num" id="s-errors" style="color:var(--red)">-</div><div class="lbl">失败</div></div>
      </div>

      <div class="card">
        <h3>许可码管理</h3>
        <div class="license-row">
          <input id="new-code" placeholder="自定义许可码（留空自动生成）">
          <button onclick="createLicense()">生成许可码</button>
        </div>
        <div id="license-msg" style="font-size:12px;margin-bottom:8px"></div>
        <div id="license-list"></div>
      </div>

      <div class="card">
        <h3>最近活跃用户</h3>
        <table>
          <thead><tr><th>设备ID</th><th>许可码</th><th>最后活跃</th><th>任务数</th></tr></thead>
          <tbody id="recent-users"><tr><td colspan="4" class="empty">连接后显示</td></tr></tbody>
        </table>
      </div>
    </div>

    <!-- 用户详情（点击用户后显示） -->
    <div id="user-detail" style="display:none">
      <div class="card">
        <h3>
          用户信息 — <span id="ud-id" style="font-family:monospace;color:var(--accent)"></span>
          <button onclick="showOverview()" style="font-size:11px;padding:4px 10px;background:var(--bg4);color:var(--txt2)">返回总览</button>
        </h3>
        <div style="display:flex;gap:20px;font-size:12px;color:var(--txt2)">
          <div>许可码: <span id="ud-license" style="color:var(--txt)"></span></div>
          <div>最后活跃: <span id="ud-active" style="color:var(--txt)"></span></div>
          <div>任务数: <span id="ud-count" style="color:var(--txt)"></span></div>
        </div>
      </div>

      <div class="card">
        <h3>任务数据 <button onclick="loadUserDetail(currentUserId)" style="font-size:11px;padding:4px 10px">刷新</button></h3>
        <table>
          <thead><tr><th>#</th><th>产品图</th><th>用户输入</th><th>AI提示词(第1段)</th><th>AI提示词(第2段)</th><th>状态</th><th>错误</th><th>时间</th></tr></thead>
          <tbody id="ud-rows"><tr><td colspan="8" class="loading">加载中...</td></tr></tbody>
        </table>
      </div>

      <div class="card">
        <h3>操作日志</h3>
        <table>
          <thead><tr><th>时间</th><th>操作</th><th>详情</th></tr></thead>
          <tbody id="ud-logs"><tr><td colspan="3" class="loading">加载中...</td></tr></tbody>
        </table>
      </div>
    </div>

  </div>
</div>

<!-- 图片预览弹窗 -->
<div class="img-modal" id="img-modal" onclick="this.classList.remove('show')">
  <img id="img-modal-src">
</div>

<script>
const API = 'https://i2v-server.vercel.app';
let adminKey = localStorage.getItem('admin_key') || '';
let allUsers = [];
let allUserRows = {}; // {device_id: [rows]}
let currentUserId = null;

// 初始化
document.addEventListener('DOMContentLoaded', () => {
  document.getElementById('cfg-key').value = adminKey;
  if (adminKey) connect();
});

async function api(path, body = null) {
  const opts = body
    ? { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ ...body, admin_key: adminKey }) }
    : { method: 'GET' };
  const url = body ? `${API}${path}` : `${API}${path}${path.includes('?') ? '&' : '?'}admin_key=${adminKey}`;
  const resp = await fetch(url, opts);
  return resp.json();
}

// 连接
async function connect() {
  adminKey = document.getElementById('cfg-key').value.trim();
  localStorage.setItem('admin_key', adminKey);
  document.getElementById('conn-dot').className = 'dot';

  try {
    await loadUsers();
    document.getElementById('conn-dot').className = 'dot ok';
  } catch (e) {
    document.getElementById('conn-dot').className = 'dot';
    document.getElementById('user-list').innerHTML = '<div class="loading" style="color:var(--red)">连接失败: ' + e.message + '</div>';
  }
}

// 加载用户列表
async function loadUsers() {
  const data = await api('/api/admin/users');
  if (!data.ok) throw new Error(data.error);

  allUsers = (data.users || []).filter(u => !u.id.startsWith('test'));
  allUsers.sort((a, b) => (b.last_active || '').localeCompare(a.last_active || ''));

  document.getElementById('user-total').textContent = `(${allUsers.length})`;
  document.getElementById('s-users').textContent = allUsers.length;

  // 渲染用户列表
  const list = document.getElementById('user-list');
  list.innerHTML = allUsers.map(u => `
    <div class="user-item ${currentUserId === u.id ? 'active' : ''}" onclick="selectUser('${u.id}')">
      <div>
        <div class="uid">${u.id}</div>
        <div class="uinfo">${u.license_code || '-'} | ${formatTime(u.last_active)}</div>
      </div>
      <span class="ubadge active">${u.license_code ? '已激活' : '-'}</span>
    </div>
  `).join('');

  // 渲染最近活跃用户
  document.getElementById('recent-users').innerHTML = allUsers.slice(0, 10).map(u => `
    <tr onclick="selectUser('${u.id}')" style="cursor:pointer">
      <td style="font-family:monospace;font-size:11px">${u.id}</td>
      <td>${u.license_code || '-'}</td>
      <td>${formatTime(u.last_active)}</td>
      <td>-</td>
    </tr>
  `).join('');

  // 统计总数
  loadAllStats();
}

async function loadAllStats() {
  let totalRows = 0, totalDone = 0, totalErrors = 0;
  // 只查最近活跃的前10个用户的数据
  for (const u of allUsers.slice(0, 10)) {
    try {
      const data = await api(`/api/admin/user-rows?device_id=${u.id}`);
      if (data.ok && data.rows) {
        allUserRows[u.id] = data.rows;
        totalRows += data.rows.length;
        totalDone += data.rows.filter(r => r.status === 'done').length;
        totalErrors += data.rows.filter(r => r.status === 'error' || r.error_msg).length;
      }
    } catch {}
  }
  document.getElementById('s-rows').textContent = totalRows;
  document.getElementById('s-done').textContent = totalDone;
  document.getElementById('s-errors').textContent = totalErrors;
}

// 选择用户
function selectUser(id) {
  currentUserId = id;
  // 高亮
  document.querySelectorAll('.user-item').forEach(el => el.classList.remove('active'));
  const items = document.querySelectorAll('.user-item');
  items.forEach(el => { if (el.querySelector('.uid')?.textContent === id) el.classList.add('active'); });

  document.getElementById('overview').style.display = 'none';
  document.getElementById('user-detail').style.display = 'block';
  loadUserDetail(id);
}

function showOverview() {
  currentUserId = null;
  document.getElementById('overview').style.display = 'block';
  document.getElementById('user-detail').style.display = 'none';
  document.querySelectorAll('.user-item').forEach(el => el.classList.remove('active'));
}

// 加载用户详情
async function loadUserDetail(id) {
  const user = allUsers.find(u => u.id === id);
  document.getElementById('ud-id').textContent = id;
  document.getElementById('ud-license').textContent = user?.license_code || '-';
  document.getElementById('ud-active').textContent = formatTime(user?.last_active);

  // 加载行数据
  const rowsData = await api(`/api/admin/user-rows?device_id=${id}`);
  const rows = rowsData.ok ? (rowsData.rows || []) : [];
  document.getElementById('ud-count').textContent = rows.length;

  if (!rows.length) {
    document.getElementById('ud-rows').innerHTML = '<tr><td colspan="8" class="empty">该用户暂无任务数据</td></tr>';
  } else {
    document.getElementById('ud-rows').innerHTML = rows.map(r => {
      const hasImg = r.image_base64 || r.image_name;
      const imgHtml = r.image_base64
        ? `<img src="${r.image_base64}" onclick="showImage(this.src)" title="点击放大">`
        : (r.image_name || '-');

      const statusMap = {
        done: ['badge-done', '已完成'],
        pending: ['badge-pending', '待处理'],
        submitted: ['badge-submitted', '已提交'],
        extending: ['badge-submitted', '延伸中'],
        error: ['badge-error', '失败'],
        regen: ['badge-pending', '重新生成'],
      };
      const [badgeCls, badgeTxt] = statusMap[r.status] || ['badge-pending', r.status || '待处理'];

      return `<tr>
        <td>${r.row_n || '-'}</td>
        <td>${imgHtml}</td>
        <td class="prompt-cell">
          <span class="prompt-short">${esc(r.user_prompt || '-')}</span>
          ${r.user_prompt ? `<div class="prompt-full">${esc(r.user_prompt)}</div>` : ''}
        </td>
        <td class="prompt-cell">
          <span class="prompt-short">${esc((r.segment_1_zh || r.segment_1 || '').substring(0, 60))}</span>
          <div class="prompt-full"><b>英文:</b>\n${esc(r.segment_1 || '(空)')}\n\n<b>中文:</b>\n${esc(r.segment_1_zh || '(空)')}</div>
        </td>
        <td class="prompt-cell">
          <span class="prompt-short">${esc((r.segment_2_zh || r.segment_2 || '').substring(0, 60))}</span>
          <div class="prompt-full"><b>英文:</b>\n${esc(r.segment_2 || '(空)')}\n\n<b>中文:</b>\n${esc(r.segment_2_zh || '(空)')}</div>
        </td>
        <td><span class="badge ${badgeCls}">${badgeTxt}</span></td>
        <td style="color:var(--red);font-size:11px;max-width:150px;overflow:hidden;text-overflow:ellipsis" title="${esc(r.error_msg || '')}">${esc(r.error_msg || '-')}</td>
        <td style="font-size:11px;color:var(--txt3);white-space:nowrap">${formatTime(r.updated_at || r.created_at)}</td>
      </tr>`;
    }).join('');
  }

  // 加载日志（通过 Firestore REST 需要专门接口，暂用占位）
  document.getElementById('ud-logs').innerHTML = '<tr><td colspan="3" style="color:var(--txt3)">日志数据请在 Firebase 控制台查看</td></tr>';
}

// 许可码
async function createLicense() {
  const code = document.getElementById('new-code').value.trim();
  const data = await api('/api/admin/create-license', { code: code || undefined });
  const msg = document.getElementById('license-msg');
  if (data.ok) {
    msg.style.color = 'var(--green)';
    msg.textContent = '已创建: ' + data.code;
    document.getElementById('new-code').value = '';
  } else {
    msg.style.color = 'var(--red)';
    msg.textContent = data.error || '失败';
  }
}

// 图片预览
function showImage(src) {
  document.getElementById('img-modal-src').src = src;
  document.getElementById('img-modal').classList.add('show');
}

// 工具函数
function esc(s) { return (s || '').replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;').replace(/"/g, '&quot;'); }

function formatTime(iso) {
  if (!iso) return '-';
  try {
    const d = new Date(iso);
    return d.toLocaleString('zh-CN', { month: '2-digit', day: '2-digit', hour: '2-digit', minute: '2-digit' });
  } catch { return iso; }
}
</script>
</body>
</html>
